name: Build PicoStation PU-7 Pico1 UF2

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi python3 git

      - name: Download Pico SDK
        run: |
          mkdir -p third_party
          if [ ! -d "third_party/pico-sdk" ]; then
            git clone --depth 1 --branch 2.1.1 https://github.com/raspberrypi/pico-sdk.git third_party/pico-sdk
          fi
          cd third_party/pico-sdk
          git submodule update --init --recursive

      - name: Download RP2040 Pseudo Atomic
        run: |
          mkdir -p third_party
          if [ ! -d "third_party/RP2040_Pseudo_Atomic" ]; then
            git clone --depth 1 https://github.com/TSprech/RP2040_Pseudo_Atomic.git third_party/RP2040_Pseudo_Atomic
          fi

      - name: Check required folders
        run: |
          ls -la third_party
          test -d third_party/pico-sdk
          test -d third_party/SD-fatfs
          test -d third_party/RP2040_Pseudo_Atomic

      - name: Configure CMake for Pi Pico RP2040
        run: |
          cmake -B build-pu7-pico1 \
            -DPICOSTATION_PU7=ON \
            -DPICOSTATION_VARIANT=picostation_pico1 \
            -DPICO_BOARD=pico

      - name: Build UF2
        run: |
          cmake --build build-pu7-pico1

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: picostation-pu7-pico1-uf2
          path: build-pu7-pico1/*.uf2
